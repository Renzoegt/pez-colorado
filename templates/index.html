<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pez Colorado - Consulta de Veda</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Consulta de Normativa - Misiones</h1>
    
    <form action="/verificar" method="GET">
        <div class="search-container">
            <input type="text" name="especie" placeholder="Ej: Dorado" required>
            <input type="number" name="medida" placeholder="Medida en cm" required>
            <input type="number" name="mes" placeholder="Mes (1-12)" required>
            <button type="submit">Consultar Estado</button>
        </div>
    </form>

    {% if resultado %}
    <div id="resultado" class="{{ 'permitido' if resultado.talla_legal else 'veda' }}">
        La especie {{ resultado.especie }} está en: {{ resultado.estado_temporada }} 
        (Talla legal: {{ 'SÍ' if resultado.talla_legal else 'NO' }})
    </div>
    {% endif %}
    <script src="../app.py"></script>
</body>
</html>
