name: Testeo de Pez Colorado

on: [push, pull_request]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar herramientas y dependencias
        run: |
            # 1. ACTUALIZAR PIP PRIMERO
            python -m pip install --upgrade pip
            # 2. Instalar el resto
            pip install flake8 pytest pip-audit
            if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Chequeo de Calidad de Código
        run: |
            pip install flake8
            # Encontrar errores de sintaxis y errores de código potencialmente problemáticos
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
            # Encontrar problemas de estilo de código (PEP8)
            flake8 . --count --max-line-length=127 --statistics
            
      - name: 2. Ejecución de Pruebas Unitarias
        run: pytest   

      - name: 3. Chequeo de Vulnerabilidades y Compatibilidad de Paquetes
        run: |
            # 1. Chequea que no haya conflictos de dependencias en tu proyecto
            pip check
            # 2. Chequea que no haya vulnerabilidades conocidas en las dependencias
            pip-audit
